<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Divisas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ff0000, #000000);
        }

        .navbar-brand {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .nav-link {
            font-weight: 500;
            color: #333 !important;
            margin: 0 8px;
            position: relative;
            transition: color 0.3s ease;
        }

        .nav-link:hover {
            color: #667eea !important;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background: #667eea;
            transition: width 0.3s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        /* Contenido principal */
        .main-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            min-height: calc(100vh - 80px);
        }

        .converter-card {
            border-radius: 20px;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.3);
            width: 100%;
            max-width: 450px;
        }

        .converter-card h2 {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 2rem;
            color: #1e3c72;
            margin-bottom: 30px;
        }

        .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .form-control,
        .form-select {
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            padding: 12px 16px;
            font-size: 1rem;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }

        .form-control-lg,
        .form-select-lg {
            padding: 14px 16px;
            font-size: 1.1rem;
        }

        .currency-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .currency-col {
            flex: 1;
        }

        .arrow-container {
            display: flex;
            align-items: flex-end;
            height: 48px;
            color: #667eea;
            font-size: 1.5rem;
            font-weight: bold;
            color: #198754;
            font-family: 'Arial', 'Helvetica', sans-serif;
        }

        .btn-convert:hover {
            background: linear-gradient(135deg, #764ba2, #667eea);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
            color: white;
        }

        .result-box {
            font-size: 1.8rem;
            font-weight: 700;
            color: #667eea;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            border-left: 4px solid #667eea;
            border-radius: 10px;
            padding: 20px;
            margin-top: 30px;
        }
    </style>
</head>

<body>
    <!-- Navbar Mejorada -->
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <div class="logo">💱</div>
                <span>ExchangeHub</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Tasas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Ayuda</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <div class="card shadow-lg p-5 converter-card">
            <h2 class="text-center">Conversor de Divisas</h2>

            <form method="post">
                <div class="mb-4">
                    <label class="form-label">Cantidad a convertir</label>
                    <input type="number" step="0.01" name="amount" class="form-control form-control-lg"
                        placeholder="Introduce la cantidad" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Selecciona las divisas</label>
                    <div class="currency-row">
                        <div class="currency-col">
                            <label class="form-label small text-muted">De:</label>
                            <select name="from_currency" class="form-select form-select-lg">
                                <option value="EUR">EUR €</option>
                                <option value="USD">USD $</option>
                                <option value="GBP">GBP £</option>
                            </select>
                        </div>
                        <div class="arrow-container">
                            ⇄
                        </div>
                        <div class="currency-col">
                            <label class="form-label small text-muted">A:</label>
                            <select name="to_currency" class="form-select form-select-lg">
                                <option value="USD">USD $</option>
                                <option value="EUR">EUR €</option>
                                <option value="GBP">GBP £</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-convert btn-lg">
                        Convertir ahora
                    </button>
                </div>
            </form>

            {% if result is not none %}
            <div class="result-box">
                <div class="text-center">
                    <small class="text-muted">Resultado de la conversión:</small>
                    <div style="margin-top: 10px;">{{ result }}</div>
                </div>
            </div>
            {% endif %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
